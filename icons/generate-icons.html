<!DOCTYPE html>
<html>
<head><title>Generate GlamBook Icons</title></head>
<body>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<canvas id="c180" width="180" height="180" style="display:none"></canvas>

<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  const r = s * 0.18; // border radius

  // Background rounded rect
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();

  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#3D0A20');
  grad.addColorStop(1, '#1A0A12');
  ctx.fillStyle = grad;
  ctx.fill();

  // "G" letter
  ctx.fillStyle = '#E8547A';
  ctx.font = `bold ${s * 0.52}px Georgia, serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('G', s * 0.44, s * 0.5);

  // Gold dot / sparkle
  ctx.fillStyle = '#D4AF37';
  ctx.font = `${s * 0.22}px serif`;
  ctx.fillText('✦', s * 0.72, s * 0.32);
}

function download(canvas, filename) {
  const a = document.createElement('a');
  a.download = filename;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

['c192', 'c512', 'c180'].forEach(id => {
  drawIcon(document.getElementById(id));
});

// Auto-download all
setTimeout(() => {
  download(document.getElementById('c192'), 'icon-192.png');
  setTimeout(() => download(document.getElementById('c512'), 'icon-512.png'), 500);
  setTimeout(() => download(document.getElementById('c180'), 'apple-touch-icon.png'), 1000);
}, 100);
</script>

<p>Les 3 icônes se téléchargent automatiquement : icon-192.png, icon-512.png, apple-touch-icon.png</p>
<p>Place-les dans le dossier <code>GlamBook/icons/</code></p>

<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512" style="width:256px;height:256px"></canvas>
</body>
</html>
