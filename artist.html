<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Profil maquilleuse — GlamBook</title>
  <meta name="description" content="Portfolio, avis clients et réservation en ligne de votre maquilleuse professionnelle sur GlamBook."/>
  <meta property="og:type" content="profile"/>
  <meta property="og:site_name" content="GlamBook"/>
  <meta property="og:title" content="Profil maquilleuse — GlamBook"/>
  <meta property="og:description" content="Portfolio, avis clients et réservation en ligne."/>
  <meta property="og:image" content="https://glambook-pi.vercel.app/icons/icon-512.png"/>
  <meta name="twitter:card" content="summary"/>
  <link rel="preconnect" href="https://lcrrdwlnxmneqfzqediu.supabase.co"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#E8547A"/>
  <link rel="stylesheet" href="/css/main.css"/>
  <script>try{if((localStorage.getItem('gb-theme')||'dark')==='light')document.documentElement.classList.add('theme-light');}catch(e){}</script>
  <script defer src="/js/theme.js"></script>
  <style>
    .cover { width:100%; height:320px; object-fit:cover; background:linear-gradient(135deg,#FDE8EF,#F9FAFB); display:block; }
    .profile-header {
      background:var(--blanc); border-bottom:1px solid var(--bord);
      padding:0 20px 24px;
    }
    .profile-header-inner { max-width:1100px; margin:0 auto; }
    .profile-top { display:flex; align-items:flex-end; gap:20px; margin-top:-48px; flex-wrap:wrap; }
    .profile-avatar {
      width:96px; height:96px; border-radius:50%; object-fit:cover;
      border:4px solid #fff; box-shadow:0 4px 16px rgba(0,0,0,.15); flex-shrink:0;
      background:linear-gradient(135deg,#FDE8EF,#E8547A);
      display:flex; align-items:center; justify-content:center;
      color:#fff; font-size:2rem; font-weight:800;
    }
    .profile-info { flex:1; padding-top:52px; }
    .profile-name { font-size:1.6rem; font-weight:900; margin-bottom:4px; }
    .profile-city { color:var(--gris); font-size:.9rem; margin-bottom:8px; }
    .profile-meta { display:flex; gap:16px; flex-wrap:wrap; align-items:center; }
    .profile-rating { font-size:1rem; font-weight:700; }
    .profile-actions { display:flex; gap:10px; padding-top:52px; flex-shrink:0; flex-wrap:wrap; }
    .social-link {
      display:inline-flex; align-items:center; gap:6px;
      padding:6px 14px; border-radius:20px; font-size:.8rem; font-weight:600;
      text-decoration:none; border:1.5px solid var(--bord); color:var(--gris);
      transition:all .15s;
    }
    .social-link:hover { border-color:var(--rose); color:var(--rose); }

    .profile-body { max-width:1100px; margin:0 auto; padding:32px 20px; display:grid; grid-template-columns:1fr 340px; gap:32px; }
    @media(max-width:768px){ .profile-body { grid-template-columns:1fr; } }

    /* Portfolio */
    .photo-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .photo-grid img {
      width:100%; aspect-ratio:1; object-fit:cover; border-radius:8px; cursor:pointer;
      transition:transform .2s; background:#FDE8EF;
    }
    .photo-grid img:hover { transform:scale(1.03); }

    /* Avis */
    .review-card { padding:16px; border:1px solid var(--bord); border-radius:var(--radius-sm); margin-bottom:12px; }
    .review-header { display:flex; justify-content:space-between; margin-bottom:8px; }
    .review-author { font-weight:700; font-size:.9rem; }
    .review-date   { font-size:.78rem; color:var(--gris); }
    .review-text   { font-size:.88rem; color:var(--gris); line-height:1.5; }

    /* Booking sidebar */
    .booking-card {
      background:var(--blanc); border-radius:var(--radius); box-shadow:var(--shadow);
      padding:24px; position:sticky; top:80px;
    }
    .booking-card h3 { font-size:1.1rem; font-weight:800; margin-bottom:4px; }
    .booking-price { font-size:1.5rem; font-weight:900; color:var(--rose); margin-bottom:20px; }
    .service-option {
      border:1.5px solid var(--bord); border-radius:var(--radius-sm);
      padding:12px 14px; margin-bottom:8px; cursor:pointer; transition:all .15s;
    }
    .service-option:hover, .service-option.selected {
      border-color:var(--rose); background:var(--rose-cl);
    }
    .service-option .svc-name { font-weight:700; font-size:.9rem; }
    .service-option .svc-price { font-size:.82rem; color:var(--rose); font-weight:700; }
    .service-option .svc-dur   { font-size:.78rem; color:var(--gris); }

    .slots-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin:12px 0; }
    .slot-btn {
      padding:8px 4px; border:1.5px solid var(--bord); border-radius:6px;
      font-size:.78rem; font-weight:600; cursor:pointer; text-align:center;
      background:var(--blanc); transition:all .15s;
    }
    .slot-btn:hover, .slot-btn.selected { border-color:var(--rose); background:var(--rose-cl); color:var(--rose); }
    .slot-btn.taken { opacity:.4; pointer-events:none; text-decoration:line-through; }

    /* Bannière unlock */
  .unlock-banner {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: linear-gradient(135deg, #1A0A12, #3D0A20);
    color: #fff; padding: 16px 20px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    box-shadow: 0 -4px 24px rgba(0,0,0,.3);
  }
  .unlock-banner .unlock-text { flex: 1; min-width: 200px; }
  .unlock-banner strong { display: block; font-size: .95rem; font-weight: 800; margin-bottom: 2px; }
  .unlock-banner span   { font-size: .78rem; color: rgba(255,255,255,.65); }
  .unlock-banner .unlock-actions { display: flex; gap: 8px; flex-shrink: 0; }

  /* Portfolio flou pour guest */
  .photo-blur-overlay {
    position: relative; border-radius: 8px; overflow: hidden;
  }
  .photo-blur-overlay img { filter: blur(6px); transform: scale(1.05); pointer-events: none; }
  .photo-blur-overlay::after {
    content: '🔒'; position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; background: rgba(0,0,0,.25);
  }

  /* Booking guest */
  .guest-booking-card {
    background:var(--blanc); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 28px 24px; text-align: center; position: sticky; top: 80px;
  }
  .guest-dispo { display: inline-flex; align-items: center; gap: 6px; background: #D1FAE5; color: #065F46; border-radius: 20px; padding: 6px 14px; font-size: .82rem; font-weight: 700; margin-bottom: 16px; }

  /* Lightbox */
    .lightbox {
      position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:500;
      display:none; align-items:center; justify-content:center;
    }
    .lightbox.open { display:flex; }
    .lightbox img { max-width:90vw; max-height:90vh; border-radius:8px; }
    .lightbox-close {
      position:absolute; top:20px; right:24px; color:#fff; font-size:2rem;
      cursor:pointer; background:none; border:none; line-height:1;
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">Glam<span>Book</span></a>
    <div class="nav-links">
      <a href="/artists.html" class="hide-mobile">← Retour</a>
      <a href="/auth/login.html">Connexion</a>
      <a href="/auth/register.html" class="btn-nav btn">Inscription</a>
    </div>
  </div>
</nav>

<img class="cover" id="cover-img" src="" alt="Portfolio"/>

<div class="profile-header">
  <div class="profile-header-inner">
    <div class="profile-top">
      <div class="profile-avatar" id="avatar">?</div>
      <div class="profile-info">
        <h1 class="profile-name" id="artist-name">Chargement...</h1>
        <div class="profile-city" id="artist-city"></div>
        <div class="profile-meta">
          <div class="profile-rating">
            <span class="stars" id="stars-display"></span>
            <span id="rating-text" style="font-size:.85rem;color:var(--gris);margin-left:6px;"></span>
          </div>
          <div id="badges-zone"></div>
        </div>
        <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;" id="social-links"></div>
      </div>
      <div class="profile-actions">
        <button class="btn btn-ghost btn-sm" id="btn-share">Partager</button>
      </div>
    </div>
  </div>
</div>

<div class="profile-body">
  <!-- COLONNE GAUCHE -->
  <div>
    <!-- Bio -->
    <div style="margin-bottom:32px;">
      <h2 style="font-size:1.1rem;font-weight:800;margin-bottom:12px;">À propos</h2>
      <p id="artist-bio" style="color:var(--gris);line-height:1.7;"></p>
    </div>

    <!-- Spécialités -->
    <div style="margin-bottom:32px;">
      <h2 style="font-size:1.1rem;font-weight:800;margin-bottom:12px;">Spécialités</h2>
      <div class="tags" id="specialties-tags"></div>
    </div>

    <!-- Portfolio -->
    <div style="margin-bottom:32px;" data-section="portfolio">
      <h2 style="font-size:1.1rem;font-weight:800;margin-bottom:16px;">Portfolio</h2>
      <div class="photo-grid" id="photo-grid">
        <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--gris);">Chargement du portfolio...</div>
      </div>
    </div>

    <!-- Avis -->
    <div data-section="avis">
      <h2 style="font-size:1.1rem;font-weight:800;margin-bottom:16px;">Avis clients <span id="review-count-title" style="color:var(--gris);font-weight:400;font-size:.9rem;"></span></h2>
      <div id="reviews-list">
        <div style="color:var(--gris);text-align:center;padding:24px;">Aucun avis pour l'instant.</div>
      </div>
    </div>
  </div>

  <!-- COLONNE DROITE — RÉSERVATION -->
  <div>
    <div class="booking-card" id="booking-card">
      <h3>Réserver</h3>
      <div class="booking-price" id="booking-price">À partir de –€</div>

      <div class="field">
        <label>Choisir une prestation</label>
        <div id="services-list"></div>
      </div>

      <div class="field">
        <label>Date</label>
        <input type="date" id="book-date" style="width:100%;padding:10px 12px;border:1.5px solid var(--bord);border-radius:8px;font-size:.9rem;"/>
      </div>

      <div id="slots-section" style="display:none;">
        <label style="font-size:.85rem;font-weight:600;display:block;margin-bottom:8px;">Créneaux disponibles</label>
        <div class="slots-grid" id="slots-grid"></div>
      </div>

      <button class="btn btn-primary btn-full" id="btn-book" disabled style="margin-top:16px;">
        Réserver ce créneau
      </button>
      <a class="btn btn-ghost btn-full" id="btn-contact" style="margin-top:8px;">💬 Contacter</a>
      <p style="font-size:.75rem;color:var(--gris);text-align:center;margin-top:10px;">
        Annulation gratuite jusqu'à 48h avant · Messagerie sécurisée
      </p>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt=""/>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { supabase, getCurrentUser, esc, safeUrl } from '/js/supabase.js';

// URL propre /artiste/<slug> (rewrite Vercel) ou fallback ?id=UUID
const slugMatch = location.pathname.match(/^\/artiste\/([^/]+)\/?$/);
const slug = slugMatch ? decodeURIComponent(slugMatch[1]) : null;
const idParam = new URLSearchParams(location.search).get('id');
if (!slug && !idParam) { location.href = '/artists.html'; }

let artistId = idParam;
let selectedService = null, selectedSlot = null, selectedDate = null;

// Vérifie si la cliente est connectée
const currentUser = await getCurrentUser();
const isGuest = !currentUser;

async function load() {
  // Vue publique : profil + photos joints en SQL, aucune donnée privée
  let q = supabase.from('artists_public').select('*');
  q = slug ? q.eq('slug', slug) : q.eq('id', artistId);
  const { data: a } = await q.maybeSingle();

  if (!a) { document.getElementById('artist-name').textContent = 'Artiste introuvable'; return; }
  artistId = a.id;
  const contactBtn = document.getElementById('btn-contact');
  if (contactBtn) contactBtn.href = '/messages.html?artist=' + encodeURIComponent(artistId);

  // Appliquer les settings de personnalisation
  const PALETTES = {
    rose:      { accent:'#E8547A', light:'#FDE8EF', cover:'linear-gradient(135deg,#3D0A20,#1A0A12)' },
    or_noir:   { accent:'#D4AF37', light:'#FDF8E7', cover:'linear-gradient(135deg,#0D0D0D,#2a2a2a)' },
    nude:      { accent:'#C8956C', light:'#FAF0E6', cover:'linear-gradient(135deg,#5C3D2E,#C8956C)' },
    bordeaux:  { accent:'#8B1A2A', light:'#F9E8EA', cover:'linear-gradient(135deg,#8B1A2A,#2D0A0E)' },
    bleu_nuit: { accent:'#4A6FA5', light:'#E8F0FA', cover:'linear-gradient(135deg,#0D1B2A,#1B3A6B)' },
    emeraude:  { accent:'#2E8B57', light:'#E8F5EE', cover:'linear-gradient(135deg,#0D2B1E,#1E5C3A)' },
    violet:    { accent:'#7B2D8B', light:'#F4E8FA', cover:'linear-gradient(135deg,#1A0A20,#4A1A5C)' },
    corail:    { accent:'#E8614A', light:'#FFE8E4', cover:'linear-gradient(135deg,#C0392B,#E8614A)' },
  };
  const s = a.profile_settings || {};
  const palette = PALETTES[s.palette] || PALETTES.rose;
  const sections = s.sections || {};
  const ctaText  = s.cta_text || 'Réserver ce créneau';

  // Injecter CSS variables
  const styleEl = document.createElement('style');
  styleEl.textContent = `:root { --rose: ${palette.accent}; --rose-cl: ${palette.light}; }`;
  document.head.appendChild(styleEl);

  // Bouton CTA
  document.getElementById('btn-book').textContent = ctaText;

  // Sections conditionnelles
  if (sections.portfolio === false) document.querySelector('[data-section="portfolio"]')?.remove();
  if (sections.services  === false) document.getElementById('booking-card')?.remove();
  if (sections.avis      === false) document.querySelector('[data-section="avis"]')?.remove();
  if (sections.social    === false) document.getElementById('social-links')?.style && (document.getElementById('social-links').style.display='none');

  const p = { full_name: a.display_name, avatar_url: a.avatar_url, city: a.city, region: a.region };
  const displayName = a.display_name || 'Maquilleuse';
  document.title = `${displayName} — Maquilleuse${a.city ? ' à ' + a.city : ''} | GlamBook`;

  // Canonical + OG dynamiques
  const pageUrl = a.slug ? `https://glambook-pi.vercel.app/artiste/${encodeURIComponent(a.slug)}` : location.href;
  const canonical = document.createElement('link');
  canonical.rel = 'canonical'; canonical.href = pageUrl;
  document.head.appendChild(canonical);
  document.querySelector('meta[property="og:title"]')?.setAttribute('content', document.title);
  const firstPhoto = (a.photos || [])[0]?.url;
  if (firstPhoto) document.querySelector('meta[property="og:image"]')?.setAttribute('content', firstPhoto);

  // Données structurées LocalBusiness
  const ld = {
    '@context': 'https://schema.org',
    '@type': 'BeautySalon',
    name: displayName,
    url: pageUrl,
    description: a.bio || 'Maquilleuse professionnelle',
    image: firstPhoto || undefined,
    address: a.city ? { '@type': 'PostalAddress', addressLocality: a.city, addressCountry: 'FR' } : undefined,
    priceRange: a.price_from ? `À partir de ${a.price_from}€` : undefined
  };
  if (a.review_count > 0) {
    ld.aggregateRating = { '@type': 'AggregateRating', ratingValue: Number(a.rating_avg), reviewCount: a.review_count, bestRating: 5 };
  }
  const ldScript = document.createElement('script');
  ldScript.type = 'application/ld+json';
  ldScript.textContent = JSON.stringify(ld);
  document.head.appendChild(ldScript);

  // Cover
  const coverEl = document.getElementById('cover-img');
  const coverUrl = safeUrl(s.cover_url);
  if (coverUrl) { coverEl.src = coverUrl; }
  else { coverEl.style.cssText = `height:240px;display:block;background:${palette.cover};`; }

  // Avatar
  const avatarEl = document.getElementById('avatar');
  if (p.avatar_url) {
    avatarEl.innerHTML = `<img src="${p.avatar_url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" alt="${p.full_name}"/>`;
  } else {
    avatarEl.textContent = (p.full_name || '?')[0];
  }

  document.getElementById('artist-name').textContent = p.full_name || 'Maquilleuse';
  document.getElementById('artist-city').textContent = '📍 ' + (p.city || p.region || 'France');
  document.getElementById('artist-bio').textContent = a.bio || 'Maquilleuse professionnelle passionnée.';
  document.getElementById('booking-price').textContent = a.price_from ? `À partir de ${a.price_from}€` : 'Sur devis';

  // Rating
  const rating = (a.rating_avg || 5).toFixed(1);
  const full   = Math.round(a.rating_avg || 5);
  document.getElementById('stars-display').textContent = '★'.repeat(full) + '☆'.repeat(5 - full);
  document.getElementById('rating-text').textContent   = `${rating} (${a.review_count || 0} avis)`;

  // Badges
  const bz = document.getElementById('badges-zone');
  if (a.is_verified) bz.innerHTML += '<span class="badge badge-vert">✓ Vérifiée</span> ';
  if (a.review_count >= 10) bz.innerHTML += '<span class="badge badge-or">⭐ Top artiste</span>';

  // Spécialités
  document.getElementById('specialties-tags').innerHTML = (a.specialties || [])
    .map(s => `<span class="tag">${esc(s)}</span>`).join('');

  // Réseaux sociaux — masqués pour les guests
  if (!isGuest) {
    const socials = [];
    const igUrl = safeUrl(a.instagram), ttUrl = safeUrl(a.tiktok), ytUrl = safeUrl(a.youtube), wsUrl = safeUrl(a.website);
    if (igUrl) socials.push(`<a class="social-link" href="${esc(igUrl)}" target="_blank" rel="noopener noreferrer">📸 Instagram</a>`);
    if (ttUrl) socials.push(`<a class="social-link" href="${esc(ttUrl)}" target="_blank" rel="noopener noreferrer">🎵 TikTok</a>`);
    if (ytUrl) socials.push(`<a class="social-link" href="${esc(ytUrl)}" target="_blank" rel="noopener noreferrer">▶️ YouTube</a>`);
    if (wsUrl) socials.push(`<a class="social-link" href="${esc(wsUrl)}" target="_blank" rel="noopener noreferrer">🌐 Site web</a>`);
    document.getElementById('social-links').innerHTML = socials.join('');
  } else {
    document.getElementById('social-links').innerHTML =
      `<span style="font-size:.78rem;color:var(--gris);">🔒 Réseaux sociaux — <a href="/auth/register.html" style="color:var(--rose);font-weight:700;">Créer un compte</a> pour voir</span>`;
  }

  // Services — visibles pour tous (pour donner envie), mais réservation bloquée
  const { data: services } = await supabase.from('services').select('*').eq('artist_id', artistId).order('price_cents');
  const sl = document.getElementById('services-list');
  if (services && services.length > 0) {
    sl.innerHTML = services.map(s => `
      <div class="service-option" data-id="${esc(s.id)}" data-price="${esc(s.price_cents)}" data-name="${esc(s.name)}" onclick="${isGuest ? 'showGuestPrompt()' : 'selectService(this)'}">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span class="svc-name">${esc(s.name)}</span>
          <span class="svc-price">${(s.price_cents/100).toFixed(0)}€</span>
        </div>
        <div class="svc-dur">${esc(String(s.duration_min))} min · ${esc(s.description || '')}</div>
      </div>`).join('');
  } else {
    sl.innerHTML = '<p style="color:var(--gris);font-size:.85rem;">Tarifs sur demande</p>';
  }

  // Portfolio — photos déjà jointes par la vue ; 2 visibles + flou pour les guests
  const photos = (a.photos || []).slice(0, 12);
  const pg = document.getElementById('photo-grid');
  if (photos && photos.length > 0) {
    if (isGuest) {
      const visible = photos.slice(0, 2);
      const locked  = photos.slice(2);
      pg.innerHTML =
        visible.map(ph => `<img src="${esc(ph.url)}" alt="" loading="lazy" onerror="this.style.background='#FDE8EF'">`).join('') +
        locked.map(ph  => `<div class="photo-blur-overlay"><img src="${esc(ph.url)}" alt="" loading="lazy"/></div>`).join('') +
        (locked.length > 0 ? `<div style="grid-column:1/-1;text-align:center;padding:14px 0;">
          <a href="/auth/register.html?redirect=${encodeURIComponent(location.href)}" class="btn btn-primary btn-sm">
            Voir les ${locked.length} autres photos →
          </a></div>` : '');
    } else {
      pg.innerHTML = photos.map(ph => `<img src="${esc(ph.url)}" alt="${esc(ph.caption||'')}" loading="lazy" onclick="openLightbox('${esc(ph.url)}')" onerror="this.style.background='#FDE8EF'">`).join('');
    }
  } else {
    pg.innerHTML = '<p style="grid-column:1/-1;color:var(--gris);text-align:center;padding:24px;">Portfolio en cours de construction</p>';
  }

  // Avis — vue reviews_public (nom du reviewer sans exposer profiles)
  const { data: reviews } = await supabase
    .from('reviews_public').select('*')
    .eq('artist_id', artistId).order('created_at', { ascending: false })
    .limit(isGuest ? 1 : 10);

  const rl = document.getElementById('reviews-list');
  if (reviews && reviews.length > 0) {
    document.getElementById('review-count-title').textContent = `(${a.review_count || reviews.length})`;
    rl.innerHTML = reviews.map(r => `
      <div class="review-card">
        <div class="review-header">
          <span class="review-author">${esc(r.reviewer_name || 'Cliente')}</span>
          <span class="review-date">${new Date(r.created_at).toLocaleDateString('fr-FR')}</span>
        </div>
        <div style="margin-bottom:6px;" class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
        <p class="review-text">${esc(r.comment || '')}</p>
      </div>`).join('');
    if (isGuest && a.review_count > 1) {
      rl.innerHTML += `<div style="text-align:center;padding:16px;background:var(--rose-cl);border-radius:10px;margin-top:8px;">
        <p style="font-size:.85rem;font-weight:600;margin-bottom:8px;">+ ${a.review_count - 1} avis supplémentaires</p>
        <a href="/auth/register.html?redirect=${encodeURIComponent(location.href)}" class="btn btn-primary btn-sm">Voir tous les avis</a>
      </div>`;
    }
  } else {
    rl.innerHTML = '<p style="color:var(--gris);text-align:center;padding:24px;">Soyez la première à laisser un avis !</p>';
  }

  // Colonne réservation — remplacée pour les guests
  if (isGuest) {
    document.getElementById('booking-card').outerHTML = `
      <div class="guest-booking-card">
        <div class="guest-dispo">✓ Disponible</div>
        <p style="font-weight:800;font-size:1.05rem;margin-bottom:8px;">Prenez rendez-vous avec ${(p.full_name||'').split(' ')[0]}</p>
        <p style="font-size:.82rem;color:var(--gris);margin-bottom:20px;">Créez un compte gratuit pour voir les créneaux disponibles et réserver en ligne.</p>
        <a href="/auth/register.html?redirect=${encodeURIComponent(location.href)}" class="btn btn-primary btn-full" style="display:block;text-align:center;margin-bottom:10px;">
          Créer un compte gratuit
        </a>
        <a href="/auth/login.html?redirect=${encodeURIComponent(location.href)}" class="btn btn-ghost btn-full" style="display:block;text-align:center;">
          J'ai déjà un compte
        </a>
        <p style="font-size:.72rem;color:var(--gris);text-align:center;margin-top:12px;">Inscription gratuite · Sans CB requise</p>
      </div>`;
  }

  // Bannière unlock pour les guests
  if (isGuest) {
    const banner = document.createElement('div');
    banner.className = 'unlock-banner';
    banner.innerHTML = `
      <div class="unlock-text">
        <strong>Débloquez le profil complet</strong>
        <span>Créneaux, tous les avis, réseaux sociaux et réservation en ligne</span>
      </div>
      <div class="unlock-actions">
        <a href="/auth/login.html?redirect=${encodeURIComponent(location.href)}" class="btn btn-ghost btn-sm" style="color:#fff;border-color:rgba(255,255,255,.3);">Connexion</a>
        <a href="/auth/register.html?redirect=${encodeURIComponent(location.href)}" class="btn btn-primary btn-sm">Créer un compte</a>
      </div>`;
    document.body.appendChild(banner);
    // Ajouter padding bas pour que le contenu ne soit pas caché sous la bannière
    document.body.style.paddingBottom = '80px';
  }
}

window.showGuestPrompt = function() {
  location.href = `/auth/register.html?redirect=${encodeURIComponent(location.href)}`;
};

// Sélection service
window.selectService = function(el) {
  document.querySelectorAll('.service-option').forEach(x => x.classList.remove('selected'));
  el.classList.add('selected');
  selectedService = { id: el.dataset.id, price: el.dataset.price, name: el.dataset.name };
  checkCanBook();
};

// Sélection date → charger créneaux
document.getElementById('book-date').addEventListener('change', async function() {
  selectedDate = this.value;
  selectedSlot = null;
  const sec  = document.getElementById('slots-section');
  const grid = document.getElementById('slots-grid');
  grid.innerHTML = '<span style="color:var(--gris);font-size:.82rem;">Chargement...</span>';
  sec.style.display = 'block';

  const { data: avail } = await supabase
    .from('availabilities')
    .select('*')
    .eq('artist_id', artistId)
    .eq('date', selectedDate);

  if (!avail || avail.length === 0) {
    grid.innerHTML = '<span style="color:var(--gris);font-size:.82rem;grid-column:1/-1;">Aucun créneau ce jour-là</span>';
  } else {
    grid.innerHTML = avail.map(slot =>
      `<button class="slot-btn ${slot.is_booked ? 'taken' : ''}" data-id="${slot.id}" data-time="${slot.time_slot}" onclick="selectSlot(this)">
         ${slot.time_slot}
       </button>`
    ).join('');
  }
  checkCanBook();
});

window.selectSlot = function(el) {
  document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedSlot = { id: el.dataset.id, time: el.dataset.time };
  checkCanBook();
};

function checkCanBook() {
  document.getElementById('btn-book').disabled = !(selectedService && selectedDate && selectedSlot);
}

document.getElementById('btn-book').addEventListener('click', async () => {
  const user = await getCurrentUser();
  if (!user) { location.href = `/auth/login.html?redirect=${encodeURIComponent(location.href)}`; return; }
  const params = new URLSearchParams({
    artist: artistId,
    service: selectedService.id,
    slot: selectedSlot.id,
    date: selectedDate,
    time: selectedSlot.time
  });
  location.href = '/booking.html?' + params.toString();
});

document.getElementById('btn-share').addEventListener('click', () => {
  if (navigator.share) navigator.share({ title: document.title, url: location.href });
  else { navigator.clipboard.writeText(location.href); showToast('Lien copié !'); }
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Lightbox
window.openLightbox = function(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
};
window.closeLightbox = function() {
  document.getElementById('lightbox').classList.remove('open');
};

document.getElementById('book-date').min = new Date().toISOString().split('T')[0];
load();
</script>
</body>
</html>
