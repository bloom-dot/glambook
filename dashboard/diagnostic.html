<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Diagnostic visage — GlamBook</title>
  <meta name="robots" content="noindex"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#E8547A"/>
  <link rel="stylesheet" href="/css/main.css"/>
  <style>
    body { background: var(--gris-cl); }
    .wrap { max-width: 760px; margin: 0 auto; padding: 22px 16px 90px; }
    .back-link { font-size:.85rem; color:var(--gris); text-decoration:none; } .back-link:hover{ color:var(--rose); }
    h1 { font-size:1.4rem; font-weight:800; letter-spacing:-.02em; margin:12px 0 2px; }
    .sub { font-size:.85rem; color:var(--gris); margin-bottom:20px; }
    .panel { background:var(--blanc); border:1px solid var(--bord); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); margin-bottom:16px; }
    .panel h2 { font-size:.72rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--rose); margin-bottom:14px; }
    .field { display:flex; flex-direction:column; gap:5px; margin-bottom:12px; }
    .field label { font-size:.75rem; font-weight:600; color:var(--gris); }
    input, textarea { font-family:inherit; font-size:.92rem; padding:11px 13px; border:1.5px solid var(--bord); border-radius:var(--radius-sm); width:100%; }
    input:focus, textarea:focus { outline:none; border-color:var(--rose); }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:520px){ .grid2 { grid-template-columns:1fr; } }

    .badges { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
    .badge2 { display:inline-flex; align-items:center; gap:6px; background:var(--rose-cl); color:var(--rose-f); font-weight:700; font-size:.82rem; padding:6px 12px; border-radius:999px; }
    .badge2 .k { color:var(--gris); font-weight:600; }
    .lbl { font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--rose); margin:14px 0 6px; }
    .chip { display:inline-block; background:#F3F4F6; border-radius:8px; padding:5px 11px; font-size:.82rem; margin:0 6px 6px 0; }
    /* Kit à emporter en évidence */
    .kit { background:var(--or-cl); border:1px solid #EBD9A0; border-radius:12px; padding:14px 16px; margin-top:12px; }
    .kit .lbl { color:#8a6d1a; margin-top:0; }
    .kit ul { list-style:none; margin:0; padding:0; }
    .kit li { display:flex; align-items:center; gap:9px; font-size:.9rem; padding:5px 0; }
    .kit li::before { content:'▢'; color:#8a6d1a; font-size:1rem; }
    .disclaimer { font-size:.72rem; font-style:italic; color:var(--gris); margin-top:12px; }
    .spinner { width:34px;height:34px;border:3px solid var(--bord);border-top-color:var(--rose);border-radius:50%;animation:spin .8s linear infinite;margin:16px auto; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .hide { display:none !important; }

    /* Liste diagnostics enregistrés */
    .diag-card { background:var(--blanc); border:1px solid var(--bord); border-radius:var(--radius); padding:14px 16px; margin-bottom:10px; box-shadow:var(--shadow); }
    .diag-card .top { display:flex; justify-content:space-between; align-items:center; gap:10px; cursor:pointer; }
    .diag-card .nm { font-weight:700; }
    .diag-card .dt { font-size:.78rem; color:var(--gris); }
    .diag-card .body { margin-top:12px; }
    .diag-card .del { background:none; border:none; color:var(--gris); cursor:pointer; font-size:1rem; padding:4px 8px; border-radius:6px; } .diag-card .del:hover{ background:var(--rose-cl); color:var(--rose-f); }
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--noir); color:#fff; padding:12px 20px; border-radius:var(--radius-sm); font-size:.85rem; font-weight:600; opacity:0; pointer-events:none; transition:all .3s; z-index:300; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .toast.error { background:var(--rose-f); }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="/dashboard/artist.html" class="back-link">← Retour au tableau de bord</a>
    <h1>Diagnostic visage</h1>
    <p class="sub">Scannez le visage d'une cliente pour connaître son type de peau à l'avance et préparer votre kit de produits à emporter.</p>

    <!-- Scan -->
    <div class="panel">
      <h2>Scanner un visage</h2>
      <div id="scanHost"></div>
    </div>

    <!-- Résultat -->
    <div class="panel hide" id="resultPanel">
      <h2>Résultat du diagnostic</h2>
      <div id="loading" class="hide"><div class="spinner"></div><p style="text-align:center;font-size:.85rem;color:var(--gris);">Analyse en cours…</p></div>
      <div id="result"></div>

      <!-- Enregistrer pour un rdv -->
      <div id="saveBlock" class="hide" style="margin-top:16px;border-top:1px solid var(--bord);padding-top:16px;">
        <div class="grid2">
          <div class="field"><label>Nom de la cliente</label><input id="cName" placeholder="Ex. Marie D."/></div>
          <div class="field"><label>Date du rendez-vous</label><input id="cDate" type="datetime-local"/></div>
        </div>
        <div class="field"><label>Note (optionnel)</label><textarea id="cNote" rows="2" placeholder="Précisions, allergies signalées, préférences…"></textarea></div>
        <button class="btn btn-primary" id="btnSave">Enregistrer pour ce rendez-vous</button>
      </div>
    </div>

    <!-- Diagnostics enregistrés -->
    <div class="panel">
      <h2>Rendez-vous & diagnostics enregistrés</h2>
      <div id="savedList"><div style="color:var(--gris);text-align:center;padding:20px;font-size:.85rem;">Chargement…</div></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { getCurrentUser } from '/js/supabase.js';
    import { createFaceScan } from '/js/scan/face-scan.js';
    import { requestFaceDiagnostic, saveDiagnostic, listDiagnostics, deleteDiagnostic } from '/js/scan/diagnostic-store.js';
    import { showToast, esc } from '/js/utils.js';

    const $ = (id) => document.getElementById(id);
    let currentDiagnostic = null;

    // Auth
    const user = await getCurrentUser();
    if (!user) { location.href = `/auth/login.html?redirect=${encodeURIComponent(location.pathname)}`; }

    const chips = (arr) => (arr && arr.length) ? arr.map(x => `<span class="chip">${esc(x)}</span>`).join('') : '<span style="color:var(--gris);font-size:.82rem;">—</span>';
    const kitList = (arr) => (arr && arr.length) ? `<ul>${arr.map(x => `<li>${esc(x)}</li>`).join('')}</ul>` : '<p style="font-size:.85rem;color:var(--gris);">—</p>';

    function renderDiagnostic(d, target = $('result')) {
      target.innerHTML = `
        <div class="badges">
          <span class="badge2"><span class="k">Sous-ton</span> ${esc(d.sous_ton || '—')}</span>
          <span class="badge2"><span class="k">Type de peau</span> ${esc(d.type_de_peau || '—')}</span>
          ${d.confiance ? `<span class="badge2"><span class="k">Confiance</span> ${esc(d.confiance)}</span>` : ''}
        </div>
        <div class="lbl">Sensibilités / imperfections</div>${chips(d.sensibilite_ou_imperfections)}
        <div class="lbl">Recommandations</div>${chips(d.recommandations_produits)}
        <div class="kit">
          <div class="lbl">🧳 Produits à emporter au rendez-vous</div>
          ${kitList(d.produits_a_prevoir && d.produits_a_prevoir.length ? d.produits_a_prevoir : d.recommandations_produits)}
        </div>
        <div class="disclaimer">Diagnostic cosmétique généré par IA, à titre indicatif — ne constitue pas un avis médical.</div>`;
    }

    // Scan → diagnostic
    const scan = createFaceScan($('scanHost'), {
      onCapture: async (dataUrl) => {
        $('resultPanel').classList.remove('hide');
        $('loading').classList.remove('hide'); $('result').innerHTML = ''; $('saveBlock').classList.add('hide');
        $('resultPanel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        try {
          currentDiagnostic = await requestFaceDiagnostic(dataUrl);
          $('loading').classList.add('hide');
          renderDiagnostic(currentDiagnostic);
          $('saveBlock').classList.remove('hide');
        } catch (e) {
          console.error(e);
          $('loading').classList.add('hide');
          $('result').innerHTML = `<p style="color:var(--gris);font-size:.88rem;">Diagnostic indisponible : ${esc(e.message)}.</p>`;
        }
      },
    });

    // Enregistrer
    $('btnSave').onclick = async () => {
      if (!currentDiagnostic) return;
      const btn = $('btnSave'); btn.disabled = true; btn.textContent = 'Enregistrement…';
      try {
        await saveDiagnostic({
          clientName: $('cName').value.trim(),
          appointmentDate: $('cDate').value ? new Date($('cDate').value).toISOString() : null,
          diagnostic: currentDiagnostic,
          note: $('cNote').value.trim(),
        });
        showToast('Diagnostic enregistré ✅');
        $('cName').value = ''; $('cDate').value = ''; $('cNote').value = '';
        $('resultPanel').classList.add('hide');
        scan.reset();
        loadSaved();
      } catch (e) { console.error(e); showToast(e.message || 'Erreur.', 'error'); }
      finally { btn.disabled = false; btn.textContent = 'Enregistrer pour ce rendez-vous'; }
    };

    // Liste enregistrée
    async function loadSaved() {
      const box = $('savedList');
      let rows;
      try { rows = await listDiagnostics(); }
      catch (e) { console.error(e); box.innerHTML = '<p style="color:var(--gris);text-align:center;padding:20px;">Impossible de charger.</p>'; return; }
      if (!rows.length) {
        box.innerHTML = '<p style="color:var(--gris);text-align:center;padding:20px;font-size:.85rem;">Aucun diagnostic enregistré pour le moment.</p>';
        return;
      }
      box.innerHTML = rows.map(r => {
        const d = r.diagnostic || {};
        const when = r.appointment_date ? new Date(r.appointment_date).toLocaleString('fr-FR', { dateStyle:'long', timeStyle:'short' }) : 'Sans date';
        return `<div class="diag-card" data-id="${esc(r.id)}">
          <div class="top" data-toggle>
            <div>
              <div class="nm">${esc(r.client_name || 'Cliente')}</div>
              <div class="dt">📅 ${esc(when)} · peau ${esc(d.type_de_peau || '—')} · sous-ton ${esc(d.sous_ton || '—')}</div>
            </div>
            <button class="del" data-del title="Supprimer">🗑</button>
          </div>
          <div class="body hide" data-body></div>
        </div>`;
      }).join('');

      box.querySelectorAll('.diag-card').forEach(card => {
        const id = card.getAttribute('data-id');
        const row = rows.find(x => x.id === id);
        card.querySelector('[data-toggle]').onclick = (e) => {
          if (e.target.hasAttribute('data-del')) return;
          const body = card.querySelector('[data-body]');
          if (body.classList.contains('hide')) { renderDiagnostic(row.diagnostic || {}, body); if (row.note) body.insertAdjacentHTML('beforeend', `<div style="margin-top:10px;font-size:.85rem;color:var(--gris);"><b>Note :</b> ${esc(row.note)}</div>`); body.classList.remove('hide'); }
          else body.classList.add('hide');
        };
        card.querySelector('[data-del]').onclick = async () => {
          if (!confirm('Supprimer ce diagnostic ?')) return;
          try { await deleteDiagnostic(id); showToast('Supprimé.'); loadSaved(); }
          catch (e) { console.error(e); showToast('Suppression impossible.', 'error'); }
        };
      });
    }

    loadSaved();
  </script>
</body>
</html>
