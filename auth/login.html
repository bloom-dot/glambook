<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Connexion — GlamBook</title>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#E8547A"/>
  <link rel="stylesheet" href="/css/main.css"/>
  <style>
    body { background: linear-gradient(135deg, #1A0A12 0%, #3D0A20 100%); min-height: 100vh; display: flex; flex-direction: column; }
    .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .auth-card { background: #fff; border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo a { font-size: 1.6rem; font-weight: 900; color: var(--rose); text-decoration: none; }
    .auth-logo a span { color: var(--or); }
    .auth-title { font-size: 1.4rem; font-weight: 800; text-align: center; margin-bottom: 6px; }
    .auth-sub { text-align: center; color: var(--gris); font-size: .88rem; margin-bottom: 28px; }
    .divider { text-align: center; color: var(--gris); font-size: .8rem; margin: 20px 0; position: relative; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: var(--bord); }
    .divider::before { left: 0; } .divider::after { right: 0; }
    .auth-footer { text-align: center; font-size: .85rem; color: var(--gris); margin-top: 20px; }
    .auth-footer a { color: var(--rose); font-weight: 600; text-decoration: none; }
    .error-msg { background: #FEE2E2; color: #991B1B; border-radius: 8px; padding: 10px 14px; font-size: .85rem; margin-bottom: 16px; display: none; }
  </style>
</head>
<body>
<nav class="nav" style="background:transparent; border:none; position:absolute; width:100%;">
  <div class="nav-inner">
    <a href="/" class="nav-logo" style="color:#fff;">Glam<span>Book</span></a>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo"><a href="/">Glam<span>Book</span></a></div>
    <h1 class="auth-title">Bon retour !</h1>
    <p class="auth-sub">Connectez-vous pour gérer vos réservations</p>

    <div class="error-msg" id="error-msg"></div>

    <form id="login-form">
      <div class="field">
        <label>Adresse email</label>
        <input type="email" id="email" placeholder="vous@exemple.fr" required autocomplete="email"/>
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <div style="position:relative;">
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" style="padding-right:44px;"/>
          <button type="button" id="toggle-password" aria-label="Afficher le mot de passe"
            style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;color:var(--gris);font-size:1.1rem;line-height:1;">
            👁
          </button>
        </div>
      </div>
      <div style="text-align:right; margin-top:-10px; margin-bottom:18px;">
        <a href="/auth/forgot.html" style="font-size:.82rem; color:var(--rose); text-decoration:none;">Mot de passe oublié ?</a>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="btn-login">Se connecter</button>
    </form>

    <div class="divider">ou</div>

    <button class="btn btn-ghost btn-full" id="btn-google" style="gap:10px;">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continuer avec Google
    </button>

    <div class="auth-footer">
      Pas encore de compte ?
      <a href="/auth/register.html">Créer un compte</a>
    </div>
    <div class="auth-footer" style="margin-top:8px;">
      Vous êtes makeup artist ?
      <a href="/auth/register.html?role=artist">Créer un profil artiste</a>
    </div>
  </div>
</div>

<script type="module">
import { supabase } from '/js/supabase.js';

// Valider le redirect : seulement les chemins internes (pas d'open redirect)
const rawRedirect = new URLSearchParams(location.search).get('redirect') || null;
const redirect = (rawRedirect && rawRedirect.startsWith('/') && !rawRedirect.startsWith('//')) ? rawRedirect : null;

// Déjà connecté → rediriger vers le bon dashboard
const { data: { user: existingUser } } = await supabase.auth.getUser();
if (existingUser) redirectAfterLogin(existingUser);

// Œil mot de passe
document.getElementById('toggle-password').addEventListener('click', function() {
  const input = document.getElementById('password');
  const show  = input.type === 'password';
  input.type  = show ? 'text' : 'password';
  this.textContent = show ? '🙈' : '👁';
});

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Connexion...';
  hideError();

  const email    = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) {
    const msgs = {
      'Invalid login credentials':        'Email ou mot de passe incorrect.',
      'Email not confirmed':              'Veuillez confirmer votre email avant de vous connecter.',
      'Too many requests':                'Trop de tentatives. Réessayez dans quelques minutes.',
    };
    showError(msgs[error.message] || 'Une erreur est survenue. Veuillez réessayer.');
    btn.disabled = false; btn.textContent = 'Se connecter';
    return;
  }
  redirectAfterLogin(data.user);
});

document.getElementById('btn-google').addEventListener('click', async () => {
  await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: location.origin + (redirect || '/') } });
});

async function redirectAfterLogin(user) {
  const { data: profile } = await supabase.from('profiles').select('role').eq('user_id', user.id).single();
  if (redirect) { location.href = redirect; return; }
  if (profile?.role === 'artist') { location.href = '/dashboard/artist.html'; return; }
  location.href = '/dashboard/client.html';
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
}
function hideError() { document.getElementById('error-msg').style.display = 'none'; }
</script>
</body>
</html>
