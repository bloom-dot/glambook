<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Maquilleuses professionnelles — Trouvez et réservez près de chez vous | GlamBook</title>
  <meta name="description" content="Parcourez les maquilleuses professionnelles disponibles : mariage, soirée, shooting. Portfolios, avis clients et réservation en ligne."/>
  <link rel="canonical" href="https://glambook-pi.vercel.app/artists.html"/>
  <meta property="og:type" content="website"/>
  <meta property="og:site_name" content="GlamBook"/>
  <meta property="og:title" content="Maquilleuses professionnelles — GlamBook"/>
  <meta property="og:description" content="Portfolios, avis clients et réservation en ligne."/>
  <meta property="og:url" content="https://glambook-pi.vercel.app/artists.html"/>
  <meta property="og:image" content="https://glambook-pi.vercel.app/icons/icon-512.png"/>
  <meta name="twitter:card" content="summary"/>
  <link rel="preconnect" href="https://lcrrdwlnxmneqfzqediu.supabase.co"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#E8547A"/>
  <link rel="stylesheet" href="/css/main.css"/>
  <script>try{if((localStorage.getItem('gb-theme')||'dark')==='light')document.documentElement.classList.add('theme-light');}catch(e){}</script>
  <script defer src="/js/theme.js"></script>
  <style>
    .page-header {
      background: linear-gradient(160deg, #0F0610 0%, #2D0818 40%, #1A0A12 100%);
      color: #fff; padding: 48px 20px 36px; position: relative; overflow: hidden;
    }
    .page-header::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 80%, rgba(232,84,122,.12), transparent 60%);
    }
    .page-header h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; position: relative; letter-spacing: -.02em; }
    .page-header p  { font-size: .9rem; color: rgba(255,255,255,.5); position: relative; }

    .filters-bar {
      background: var(--nav-bg);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,.06);
      padding: 14px 20px; position: sticky; top: var(--nav-h); z-index: 50;
    }
    .filters-inner {
      max-width: 1120px; margin: 0 auto;
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .filter-pill {
      padding: 8px 16px; border-radius: 24px; border: 1.5px solid var(--bord);
      font-size: .8rem; font-weight: 600; cursor: pointer;
      background: var(--blanc); color: var(--noir); transition: all var(--transition);
    }
    .filter-pill:hover { border-color: rgba(232,84,122,.3); background: var(--rose-cl); }
    .filter-pill.active {
      border-color: var(--rose); background: var(--rose); color: var(--blanc);
      box-shadow: 0 2px 8px rgba(232,84,122,.25);
    }
    .filter-input {
      padding: 8px 14px; border: 1.5px solid var(--bord); border-radius: 24px;
      font-size: .8rem; min-width: 160px; color: var(--noir); font-family: inherit;
      background: var(--blanc); transition: all var(--transition);
    }
    .filter-input::placeholder { color: var(--gris); }
    .filter-input:focus { outline: none; border-color: var(--rose); box-shadow: 0 0 0 3px rgba(232,84,122,.1); }

    .results-meta { color: var(--gris); font-size: .82rem; margin-bottom: 20px; font-weight: 500; }
    .no-results { text-align: center; padding: 80px 20px; color: var(--gris); }
    .no-results .icon { font-size: 3rem; margin-bottom: 16px; }
    .no-results h3 { font-size: 1.1rem; font-weight: 700; color: var(--noir); margin-bottom: 8px; }

    .sort-select {
      margin-left: auto; padding: 8px 14px; border: 1.5px solid var(--bord);
      border-radius: 24px; font-size: .8rem; cursor: pointer; font-family: inherit;
      background: var(--blanc); color: var(--noir); transition: all var(--transition);
    }
    .sort-select:focus { outline: none; border-color: var(--rose); }

    @media (max-width: 640px) {
      .filters-inner { gap: 6px; }
      .filter-pill { padding: 6px 12px; font-size: .75rem; }
      .filter-input { min-width: 120px; }
    }

    /* Skeleton loaders */
    @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
    .skeleton {
      background: linear-gradient(90deg, rgba(0,0,0,.05) 25%, rgba(0,0,0,.1) 50%, rgba(0,0,0,.05) 75%);
      background-size: 800px 100%; animation: shimmer 1.4s infinite linear; border-radius: 8px;
    }
    .skel-card { border-radius: 16px; overflow: hidden; background:var(--blanc); border: 1px solid rgba(0,0,0,.06); }
    .skel-card .sk-cover { height: 200px; border-radius: 0; }
    .skel-card .sk-body { padding: 16px; }
    .skel-card .sk-line { height: 14px; margin-bottom: 10px; }
    @media (prefers-reduced-motion: reduce) { .skeleton { animation: none; } }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">Glam<span>Book</span></a>
    <div class="nav-links">
      <a href="/auth/login.html">Connexion</a>
      <a href="/auth/register.html" class="btn-nav btn">Inscription</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h1>Maquilleuses professionnelles</h1>
    <p id="header-sub">Recherche en cours...</p>
  </div>
</div>

<div class="filters-bar">
  <div class="filters-inner">
    <input class="filter-input" id="f-city" placeholder="🔍 Ville ou région" type="text"/>
    <button class="filter-pill" id="f-near" title="Rechercher autour de ma position">📍 Autour de moi</button>
    <select class="sort-select" id="f-radius" style="margin-left:0;" title="Rayon de recherche">
      <option value="0">Partout</option>
      <option value="5">5 km</option>
      <option value="10">10 km</option>
      <option value="20">20 km</option>
      <option value="50">50 km</option>
    </select>
    <input class="filter-input" id="f-date" type="date"/>
    <button class="filter-pill active" data-service="">Toutes</button>
    <button class="filter-pill" data-service="mariage">Mariage</button>
    <button class="filter-pill" data-service="soiree">Soirée</button>
    <button class="filter-pill" data-service="editorial">Shooting</button>
    <button class="filter-pill" data-service="scene">Scène</button>
    <select class="sort-select" id="f-sort">
      <option value="rating">Mieux notées</option>
      <option value="price_asc">Prix croissant</option>
      <option value="price_desc">Prix décroissant</option>
      <option value="recent">Récentes</option>
    </select>
  </div>
</div>

<section class="section">
  <div class="container">
    <div class="results-meta" id="results-meta"></div>
    <div class="artists-grid" id="artists-grid" aria-live="polite"></div>
    <div style="text-align:center;margin-top:40px;">
      <button class="btn btn-ghost" id="btn-load-more" style="display:none;">Voir plus de maquilleuses</button>
    </div>
  </div>
</section>

<div class="toast" id="toast"></div>

<script type="module">
import { supabase, esc, safeUrl } from '/js/supabase.js';

const params  = new URLSearchParams(location.search);
let filters   = {
  city:    params.get('city')    || '',
  date:    params.get('date')    || '',
  service: params.get('service') || '',
  sort:    'rating',
  radius:  0,          // km (0 = partout)
  center:  null,       // { lat, lng }
  near:    false       // recherche autour de ma position
};

// Géocodage ville (Base Adresse Nationale, gratuit) — mis en cache
const geoCache = new Map();
async function geocodeCity(city) {
  if (!city || !city.trim()) return null;
  const key = city.trim().toLowerCase();
  if (geoCache.has(key)) return geoCache.get(key);
  try {
    const r = await fetch('https://api-adresse.data.gouv.fr/search/?q=' + encodeURIComponent(city.trim()) + '&type=municipality&limit=1');
    const j = await r.json();
    const c = j.features?.[0]?.geometry?.coordinates;
    const res = c ? { lng: c[0], lat: c[1] } : null;
    geoCache.set(key, res);
    return res;
  } catch (e) { console.warn('Géocodage impossible', e); return null; }
}
function haversineKm(a, b) {
  const R = 6371, toRad = (x) => x * Math.PI / 180;
  const dLat = toRad(b.lat - a.lat), dLng = toRad(b.lng - a.lng);
  const s = Math.sin(dLat/2)**2 + Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.asin(Math.sqrt(s));
}
let page = 0;
const PAGE_SIZE = 12;

// Init filtres depuis URL
document.getElementById('f-city').value = filters.city;
document.getElementById('f-date').value = filters.date;
document.getElementById('f-date').min   = new Date().toISOString().split('T')[0];
if (filters.service) {
  document.querySelectorAll('.filter-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.service === filters.service);
  });
}

// Events
document.getElementById('f-city').addEventListener('input', debounce(() => { filters.city = document.getElementById('f-city').value; reload(); }, 400));
document.getElementById('f-date').addEventListener('change', () => { filters.date = document.getElementById('f-date').value; reload(); });
document.getElementById('f-sort').addEventListener('change', () => { filters.sort = document.getElementById('f-sort').value; reload(); });
document.getElementById('f-radius').addEventListener('change', () => {
  filters.radius = parseInt(document.getElementById('f-radius').value) || 0;
  reload();
});
document.getElementById('f-near').addEventListener('click', () => {
  const btn = document.getElementById('f-near');
  if (filters.near) { filters.near = false; filters.center = null; btn.classList.remove('active'); reload(); return; }
  if (!navigator.geolocation) { showToast('Géolocalisation non disponible sur cet appareil.'); return; }
  btn.textContent = '📍 Localisation…';
  navigator.geolocation.getCurrentPosition((pos) => {
    filters.near = true;
    filters.center = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    if (!filters.radius) { filters.radius = 10; document.getElementById('f-radius').value = '10'; }
    btn.classList.add('active'); btn.textContent = '📍 Autour de moi';
    reload();
  }, (err) => {
    console.warn(err); btn.textContent = '📍 Autour de moi';
    showToast('Position non autorisée. Saisissez une ville et choisissez un rayon.');
  }, { enableHighAccuracy: false, timeout: 8000 });
});
document.querySelectorAll('.filter-pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.filter-pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    filters.service = p.dataset.service;
    reload();
  });
});
document.getElementById('btn-load-more').addEventListener('click', () => loadArtists(false));

function skeletons(n) {
  return Array(n).fill(`<div class="skel-card"><div class="skeleton sk-cover"></div><div class="sk-body"><div class="skeleton sk-line" style="width:60%;"></div><div class="skeleton sk-line" style="width:40%;"></div></div></div>`).join('');
}

function reload() { page = 0; document.getElementById('artists-grid').innerHTML = skeletons(6); loadArtists(true); }

async function loadArtists(reset) {
  if (reset) page = 0;
  const from = page * PAGE_SIZE;
  const to   = from + PAGE_SIZE - 1;

  // Centre de recherche géo : ma position (near) ou géocodage de la ville
  let center = filters.center;
  if (filters.radius > 0 && !filters.near) center = await geocodeCity(filters.city);
  const geoMode = filters.radius > 0 && center && center.lat != null;

  let q = supabase
    .from('artists_public')
    .select('id, slug, display_name, avatar_url, city, region, rating_avg, review_count, price_from, specialties, created_at, photos, lat, lng', { count: 'exact' });

  if (geoMode) {
    // Pré-filtre par boîte englobante (rapide côté SQL), rayon exact calculé ensuite
    const dLat = filters.radius / 111;
    const dLng = filters.radius / (111 * Math.max(Math.cos(center.lat * Math.PI / 180), 0.01));
    q = q.not('lat', 'is', null)
         .gte('lat', center.lat - dLat).lte('lat', center.lat + dLat)
         .gte('lng', center.lng - dLng).lte('lng', center.lng + dLng)
         .range(0, 199);
  } else {
    q = q.range(from, to);
    if (filters.city) q = q.or(`city.ilike.%${filters.city}%,region.ilike.%${filters.city}%`);
  }

  if (filters.service) q = q.contains('specialties', [filters.service]);
  if (filters.date) q = q.in('id',
    (await supabase.from('availabilities').select('artist_id').eq('date', filters.date).eq('is_available', true).eq('is_booked', false)).data?.map(r => r.artist_id) || []
  );

  if (!geoMode) {
    if (filters.sort === 'rating')      q = q.order('rating_avg', { ascending: false });
    if (filters.sort === 'price_asc')   q = q.order('price_from', { ascending: true });
    if (filters.sort === 'price_desc')  q = q.order('price_from', { ascending: false });
    if (filters.sort === 'recent')      q = q.order('created_at', { ascending: false });
  }

  let { data, count, error } = await q;

  // Mode géo : distance exacte (Haversine), filtre au rayon, tri par proximité
  if (geoMode && data) {
    data = data.map(a => ({ ...a, _dist: haversineKm(center, { lat: a.lat, lng: a.lng }) }))
               .filter(a => a._dist <= filters.radius)
               .sort((x, y) => x._dist - y._dist);
    count = data.length;
  }

  const grid = document.getElementById('artists-grid');
  if (reset) grid.innerHTML = '';

  if (error || !data || data.length === 0) {
    if (reset) grid.innerHTML = `
      <div class="no-results" style="grid-column:1/-1;">
        <div class="icon">💄</div>
        <h3>Aucune maquilleuse trouvée</h3>
        <p>Essayez d'élargir votre recherche ou de changer la date.</p>
      </div>`;
    document.getElementById('btn-load-more').style.display = 'none';
    document.getElementById('results-meta').textContent = '';
    document.getElementById('header-sub').textContent = geoMode
      ? (filters.near ? `Aucune maquilleuse à moins de ${filters.radius} km de vous` : `Aucune maquilleuse à moins de ${filters.radius} km de ${filters.city || 'cette ville'}`)
      : (filters.city ? `Maquilleuses à ${filters.city}` : 'Toutes les maquilleuses');
    return;
  }

  data.forEach(a => {
    const stars = '★'.repeat(Math.round(a.rating_avg || 5)) + '☆'.repeat(5 - Math.round(a.rating_avg || 5));
    const el  = document.createElement('a');
    el.href   = a.slug ? `/artiste/${encodeURIComponent(a.slug)}` : `/artist.html?id=${encodeURIComponent(a.id)}`;
    el.className = 'artist-card';
    const name = esc(a.display_name || 'Maquilleuse');
    const city = esc(a.city || a.region || 'France');
    const coverUrl = safeUrl((a.photos||[])[0]?.url) || '';
    const avatarUrl = safeUrl(a.avatar_url);
    el.setAttribute('aria-label', `Voir le profil de ${name}`);
    el.innerHTML = `
      <img class="artist-card-cover" src="${coverUrl}" alt="Réalisations de ${name}" loading="lazy"
           onerror="this.style.cssText='height:200px;display:flex;background:linear-gradient(135deg,rgba(232,84,122,.14),#27272A)'"/>
      <div class="artist-card-body">
        <div class="artist-card-header">
          <div class="artist-avatar avatar-placeholder" style="width:52px;height:52px;font-size:1.1rem;margin-top:-30px;border:3px solid #fff;flex-shrink:0;overflow:hidden;">
            ${avatarUrl ? `<img src="${avatarUrl}" alt="" style="width:100%;height:100%;object-fit:cover;"/>` : esc((a.display_name || '?')[0])}
          </div>
          <div>
            <div class="artist-name">${name}</div>
            <div class="artist-city">📍 ${city}${a._dist != null ? ` · à ${a._dist < 10 ? a._dist.toFixed(1) : Math.round(a._dist)} km` : ''}</div>
          </div>
        </div>
        <div class="tags">${(a.specialties || []).slice(0,3).map(s => `<span class="tag">${esc(s)}</span>`).join('')}</div>
        <div class="artist-card-meta">
          <div><span class="stars">${stars}</span> <span style="font-size:.8rem;color:var(--gris);">(${parseInt(a.review_count)||0})</span></div>
          <div class="artist-price">À partir de ${parseInt(a.price_from)||'–'}€</div>
        </div>
      </div>`;
    grid.appendChild(el);
  });

  page++;
  document.getElementById('btn-load-more').style.display = (!geoMode && page * PAGE_SIZE < count) ? 'inline-flex' : 'none';

  const sub = geoMode
    ? (filters.near ? `Autour de vous · ${filters.radius} km` : `Autour de ${filters.city || 'la ville'} · ${filters.radius} km`)
    : (filters.city ? `Maquilleuses à ${filters.city}` : 'Toutes les maquilleuses');
  document.getElementById('header-sub').textContent = sub + (filters.date ? ` — ${new Date(filters.date).toLocaleDateString('fr-FR')}` : '');
  document.getElementById('results-meta').textContent = `${count} maquilleuse${count > 1 ? 's' : ''} trouvée${count > 1 ? 's' : ''}`;
  if (filters.city && !geoMode) {
    document.title = `Maquilleuses à ${filters.city} — GlamBook`;
    document.querySelector('.page-header h1').textContent = `Maquilleuses professionnelles à ${filters.city}`;
  }
}

function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

document.getElementById('artists-grid').innerHTML = skeletons(6);
loadArtists(true);
</script>
</body>
</html>
